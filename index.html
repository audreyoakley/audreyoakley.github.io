
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Audrey's Bakery</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<style>
		:root{ --pink-1:#ff9bb7; --pink-2:#ffc6de; }
		html,body{ margin:0; padding:0; }
		body{ font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#fff; color:#2b2b2b; }

		/* Awning */
		.awning{ position:relative; height:140px; min-height:120px; width:100%; overflow:visible; background: repeating-linear-gradient(90deg, var(--pink-1) 0 60px, var(--pink-2) 60px 120px); }
		.awning .logo{ position:absolute; left:50%; bottom:18px; transform:translateX(-50%); color:#fff; font-weight:700; letter-spacing:2px; font-size:20px; text-shadow:0 1px 0 rgba(0,0,0,0.12); z-index: 999; font-family: 'Bungee', cursive; }

		/* Left circular brand image inside awning */
		.awning .brand-img{ position:absolute; left:16px; bottom:18px; width:100px; height:100px; border-radius:50%; object-fit:cover; box-shadow:0 6px 12px rgba(0,0,0,0.12); border:3px solid rgba(255,255,255,0.65); background:#fff; z-index:1000; }

		/* Scalloped bottom: place scallop top at awning bottom and match stripe width (60px) */
		.awning::after{
			content:"";
			position:absolute;
			left:0; right:0; top:calc(100% - 28px); /* move up by half the scallop diameter */
			height:56px; /* enough to contain full scallop circles */
			background: repeating-linear-gradient(90deg, var(--pink-1) 0 60px, var(--pink-2) 60px 120px);
			background-size: 100% 100%;
			/* center each circular mask at 28px down so scallop top meets awning bottom when shifted up */
			-webkit-mask-image: radial-gradient(circle at 30px 28px, #000 28px, transparent 29px);
			-webkit-mask-size: 60px 56px;
			-webkit-mask-repeat: repeat-x;
			mask-image: radial-gradient(circle at 30px 28px, #000 28px, transparent 29px);
			mask-size: 60px 56px;
			mask-repeat: repeat-x;
			pointer-events:none;
		}

		main{ padding:48px 16px; text-align:center; }
		h1{ margin:0; font-size:40px; letter-spacing:4px; font-family: 'Bungee', 'Montserrat', sans-serif; }

		/* Cupcake grid */
		.cupcake-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:900px; margin:24px auto 0; }
		.cupcake-grid img{ width:100%; height:180px; object-fit:cover; border-radius:12px; box-shadow:0 6px 16px rgba(0,0,0,0.08); display:block; }

		/* Mini pie star mask */
		.minipie-wrap{ margin:32px auto 64px; display:flex; justify-content:center; }
		.minipie-svg{ width:220px; height:220px; display:block; }
		.minipie-svg image{ width:100%; height:100%; display:block; }
		.minipie-svg .star-outline{ fill:none; stroke:#ac95ff; stroke-width:2; stroke-linejoin:round; vector-effect:non-scaling-stroke; }
		.minipie-svg .bubble-outline{ fill:none; stroke:#000; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; vector-effect:non-scaling-stroke; }
	</style>
</head>
<body>
	<div class="awning" role="banner">
		<img src="images/logo-square.png" alt="Audrey's Bakery logo" class="brand-img">
		<div class="logo">AUDREY'S BAKERY</div>
	</div>

	<main>
		<h1>
			AUDREY'S BAKERY
		</h1>

		<section class="cupcake-grid" aria-label="Cupcake gallery">
			<img src="images/cupcake.png" alt="Cupcake 1">
			<img src="images/cupcake.png" alt="Cupcake 2">
			<img src="images/cupcake.png" alt="Cupcake 3">
			<img src="images/cupcake.png" alt="Cupcake 4">
			<img src="images/cupcake.png" alt="Cupcake 5">
			<img src="images/cupcake.png" alt="Cupcake 6">
		</section>

		<!-- Mini pie displayed in a star-shaped mask -->
		<section class="minipie-wrap" aria-label="Mini pie">
			<svg viewBox="0 0 100 100" class="minipie-svg" role="img" aria-label="Mini pie">
					<defs>
						<!-- irregular 'blob' path for a less-perfect bubble -->
						<clipPath id="bubbleClip">
							<path d="M50 8 C64 2 80 10 88 24 C96 38 86 52 78 64 C70 76 58 86 44 84 C30 82 18 72 12 56 C10 42 18 34 26 28 C36 20 44 12 50 8 Z" />
						</clipPath>
					</defs>
					<image href="images/cookies.png" width="100" height="100" preserveAspectRatio="xMidYMid slice" clip-path="url(#bubbleClip)"></image>
					<path d="M50 8 C64 2 80 10 88 24 C96 38 86 52 78 64 C70 76 58 86 44 84 C30 82 18 72 12 56 C10 42 18 34 26 28 C36 20 44 12 50 8 Z" class="bubble-outline" />
			</svg>
		</section>
	</main>
</body>
